  status = 200

[[redirects]]
  from = "/api/security/*"
  to = ":API_URL/api/security/:splat"
  status = 200

[[redirects]]
  from = "/api/guardrails/*"
  to = ":API_URL/api/guardrails/:splat"
  status = 200

[[redirects]]
  from = "/api/profile/*"
  to = ":API_URL/api/profile/:splat"
