  status = 200

[[redirects]]
  from = "/api/tenants/*"
  to = ":API_URL/api/tenants/:splat"
  status = 200

[[redirects]]
  from = "/api/notifications/*"
  to = ":API_URL/api/notifications/:splat"
  status = 200

[[redirects]]
  from = "/api/ship/*"
  to = ":API_URL/api/ship/:splat"
  status = 200

[[redirects]]
  from = "/api/mcp/*"
  to = ":API_URL/api/mcp/:splat"
  status = 200

[[redirects]]
  from = "/api/reports/*"
  to = ":API_URL/api/reports/:splat"
  status = 200

[[redirects]]
  from = "/api/collaboration/*"
  to = ":API_URL/api/collaboration/:splat"
  status = 200

[[redirects]]
  from = "/api/webhooks/*"
  to = ":API_URL/api/webhooks/:splat"
