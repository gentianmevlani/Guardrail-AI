[[redirects]]
  from = "/api/findings/*"
  to = ":API_URL/api/findings/:splat"
  status = 200

[[redirects]]
  from = "/api/dashboard/*"
  to = ":API_URL/api/dashboard/:splat"
  status = 200

[[redirects]]
  from = "/api/usage/*"
  to = ":API_URL/api/usage/:splat"
  status = 200

[[redirects]]
  from = "/api/organizations/*"
  to = ":API_URL/api/organizations/:splat"
