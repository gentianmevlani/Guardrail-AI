[[redirects]]
  from = "/health"
  to = ":API_URL/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# =============================================================================
# Context-Specific Configuration
# =============================================================================

[context.production]
  command = "rm -rf apps/web-ui/.next && pnpm run build:netlify"
  [context.production.environment]
    NODE_ENV = "production"
    # API_URL should be set in Netlify dashboard, not here
    # Example: API_URL = "https://guardrail-production.up.railway.app"

[context.deploy-preview]
  command = "rm -rf apps/web-ui/.next && pnpm run build:netlify"
  [context.deploy-preview.environment]
    NODE_ENV = "development"
    # Preview deploys use staging API by default
    # Override API_URL in Netlify dashboard if needed

[context.branch-deploy]
  command = "rm -rf apps/web-ui/.next && pnpm run build:netlify"
  [context.branch-deploy.environment]
    NODE_ENV = "development"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
