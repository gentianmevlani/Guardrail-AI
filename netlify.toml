# Next.js App Router - handle all routes through Next.js
# The root page.tsx will redirect to /dashboard/auth
# This ensures Next.js handles all routing

# =============================================================================
# Context-Specific Configuration
# =============================================================================

[context.production]
  command = "cd ../.. && NODE_ENV=development pnpm install --frozen-lockfile --ignore-scripts --shamefully-hoist && pnpm --filter guardrail-security run build && NODE_ENV=production pnpm --filter @guardrail/web-ui run build"
  [context.production.environment]
    API_URL = "https://api.guardrailai.dev"

[context.deploy-preview]
  command = "cd ../.. && NODE_ENV=development pnpm install --frozen-lockfile --ignore-scripts --shamefully-hoist && pnpm --filter guardrail-security run build && NODE_ENV=production pnpm --filter @guardrail/web-ui run build"
  [context.deploy-preview.environment]
    API_URL = "https://api.guardrailai.dev"

[context.branch-deploy]
  command = "cd ../.. && NODE_ENV=development pnpm install --frozen-lockfile --ignore-scripts --shamefully-hoist && pnpm --filter guardrail-security run build && NODE_ENV=production pnpm --filter @guardrail/web-ui run build"
  [context.branch-deploy.environment]
    API_URL = "https://api.guardrailai.dev"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
