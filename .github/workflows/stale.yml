# Stale Issues and PRs Management
name: Stale

on:
  schedule:
    - cron: "0 9 * * *" # Run daily at 9am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed in 14 days if no further activity occurs.

            If this issue is still relevant:
            - Add a comment explaining the current status
            - Remove the `stale` label

            Thank you for your contributions to Guardrail! 🛡️
          close-issue-message: |
            This issue has been automatically closed due to inactivity.

            If you believe this issue is still relevant, please open a new issue with updated information.

          # PRs
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed in 7 days if no further activity occurs.

            Please update your PR or let us know if you need help!
          close-pr-message: |
            This pull request has been automatically closed due to inactivity.

            Feel free to reopen it when you're ready to continue working on it.

          # Exemptions
          exempt-issue-labels: |
            pinned
            security
            bug
            enhancement
            help wanted
            good first issue
            in-progress
            blocked
            roadmap
          exempt-pr-labels: |
            pinned
            security
            in-progress
            blocked

          exempt-all-milestones: true
          exempt-all-assignees: true
