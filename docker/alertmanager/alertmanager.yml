# guardrail Alertmanager Configuration
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    # Configure your notification channels here
    # Example webhook:
    # webhook_configs:
    #   - url: 'http://api:3000/api/webhooks/alerts'
    #     send_resolved: true

  - name: 'critical-receiver'
    # Configure critical alert notifications
    # Example Slack:
    # slack_configs:
    #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
    #     channel: '#guardrail-alerts'
    #     send_resolved: true
    #     title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
    #     text: '{{ .CommonAnnotations.description }}'

  - name: 'warning-receiver'
    # Configure warning notifications

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
