# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'guardrail Dashboards'
    orgId: 1
    folder: 'guardrail'
    folderUid: 'guardrail'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
